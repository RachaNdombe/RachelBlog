<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des Messages</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
    <div class="container">
        <h1>Gestion des Messages</h1>
        <div id="messages"></div>
    </div>

    <script>
        async function loadMessages() {
            const res = await fetch('/messages');
            const messages = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = messages.map(msg => `
                <div class="message-card">
                    <h3>${msg.subject}</h3>
                    <p><strong>De:</strong> ${msg.name} (${msg.email})</p>
                    <p>${msg.message}</p>
                    <p><small>${new Date(msg.date).toLocaleString()}</small></p>
                    ${!msg.replied ? `<button class="btn-admin" onclick="reply(${msg.id})">Répondre</button>` : '<p style="color:var(--accent-tertiary);">Répondu</p>'}
                    <div id="reply-${msg.id}" style="display:none; margin-top:1rem;">
                        <textarea id="replyText-${msg.id}" placeholder="Votre réponse..."></textarea>
                        <button class="btn-admin btn-admin-secondary" onclick="sendReply(${msg.id})">Envoyer Réponse</button>
                    </div>
                </div>
            `).join('');
        }

        function reply(id) {
            document.getElementById(`reply-${id}`).style.display = 'block';
        }

        async function sendReply(id) {
            const text = document.getElementById(`replyText-${id}`).value;
            await fetch('/reply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, replyMessage: text})
            });
            alert('Réponse envoyée!');
            loadMessages();
        }

        loadMessages();
    </script>
</body>
</html>
